<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .shield-fill { fill: #1a3a8a; }
      .shield-stroke { stroke: #1a3a8a; }
      .accent { fill: #ffffff; }
      .D-letter {
        font-family: "Times New Roman", "Hiragino Mincho ProN", serif;
        font-weight: 900;
        font-style: italic;
        fill: #ffffff;
      }
      .since-text {
        font-family: "Arial Black", "Helvetica", sans-serif;
        font-weight: 700;
        fill: #ffffff;
        letter-spacing: 2px;
      }
      .name-text {
        font-family: "Arial Black", "Helvetica", sans-serif;
        font-weight: 800;
        fill: #ffffff;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <!-- Shield outline -->
  <path d="M 110 12
           C 70 12 38 16 30 26
           L 30 130
           C 30 168 60 198 110 218
           C 160 198 190 168 190 130
           L 190 26
           C 182 16 150 12 110 12 Z"
        class="shield-fill"
        stroke="#ffffff" stroke-width="3"/>

  <!-- Inner border -->
  <path d="M 110 22
           C 73 22 42 26 36 34
           L 36 128
           C 36 162 64 188 110 206
           C 156 188 184 162 184 128
           L 184 34
           C 178 26 147 22 110 22 Z"
        fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <!-- Laurel left (simplified leaves) -->
  <g class="accent" opacity="0.95">
    <ellipse cx="60" cy="55" rx="3.5" ry="7" transform="rotate(-35 60 55)"/>
    <ellipse cx="52" cy="70" rx="3.5" ry="7" transform="rotate(-25 52 70)"/>
    <ellipse cx="48" cy="86" rx="3.5" ry="7" transform="rotate(-15 48 86)"/>
    <ellipse cx="46" cy="103" rx="3.5" ry="7" transform="rotate(-5 46 103)"/>
    <ellipse cx="48" cy="120" rx="3.5" ry="7" transform="rotate(5 48 120)"/>
  </g>

  <!-- Laurel right -->
  <g class="accent" opacity="0.95">
    <ellipse cx="160" cy="55" rx="3.5" ry="7" transform="rotate(35 160 55)"/>
    <ellipse cx="168" cy="70" rx="3.5" ry="7" transform="rotate(25 168 70)"/>
    <ellipse cx="172" cy="86" rx="3.5" ry="7" transform="rotate(15 172 86)"/>
    <ellipse cx="174" cy="103" rx="3.5" ry="7" transform="rotate(5 174 103)"/>
    <ellipse cx="172" cy="120" rx="3.5" ry="7" transform="rotate(-5 172 120)"/>
  </g>

  <!-- Old English D -->
  <text x="110" y="125" text-anchor="middle" class="D-letter" font-size="110">D</text>

  <!-- SINCE 1992 divider lines and text -->
  <line x1="68" y1="138" x2="152" y2="138" stroke="#ffffff" stroke-width="1"/>
  <text x="110" y="150" text-anchor="middle" class="since-text" font-size="11">SINCE 1992</text>
  <line x1="68" y1="155" x2="152" y2="155" stroke="#ffffff" stroke-width="1"/>

  <!-- DENEN RUGBY SCHOOL ribbon -->
  <g>
    <!-- Ribbon body -->
    <path d="M 18 175 L 202 175 L 196 197 L 24 197 Z" class="shield-fill" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Ribbon tails -->
    <path d="M 18 175 L 8 185 L 18 185 Z" class="shield-fill" stroke="#ffffff" stroke-width="1.2" opacity="0.85"/>
    <path d="M 202 175 L 212 185 L 202 185 Z" class="shield-fill" stroke="#ffffff" stroke-width="1.2" opacity="0.85"/>
    <path d="M 8 185 L 18 197 L 18 185 Z" class="shield-fill" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/>
    <path d="M 212 185 L 202 197 L 202 185 Z" class="shield-fill" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/>
    <text x="110" y="190" text-anchor="middle" class="name-text" font-size="13">DENEN RUGBY SCHOOL</text>
  </g>
</svg>
